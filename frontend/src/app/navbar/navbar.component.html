<nav class="top-nav" role="navigation" aria-label="Main navigation">
  <a class="nav-logo" [routerLink]="['/']" aria-label="CineMixer home">CineMixer</a>

  <div class="nav-links">
    <a
      class="nav-link"
      [routerLink]="['/']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      id="nav-link-discover"
      aria-current="page"
    >Discover</a>
    <a
      class="nav-link"
      [routerLink]="['/watchlist']"
      routerLinkActive="active"
      id="nav-link-watchlist"
    >Watchlist</a>
  </div>

  <div class="nav-actions">
    <button class="nav-btn" id="nav-btn-settings" title="Settings" aria-label="Settings">
      <span class="material-symbols-rounded">settings</span>
    </button>
    <a class="nav-btn" [routerLink]="['/account']" id="nav-btn-account" title="Account" aria-label="Account">
      @if (session$ | async) {
        <span class="user-avatar">{{ getUserInitials() }}</span>
      } @else {
        <span class="material-symbols-rounded">account_circle</span>
      }
    </a>
  </div>
</nav>
